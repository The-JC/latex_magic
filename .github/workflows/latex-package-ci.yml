name: LaTeX Package CI

on:
  push:
  pull_request:

jobs:
  test-loadability:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testfile:
          - tests/load_wirelesscomm.tex
          - tests/load_wc_macros.tex
          - tests/load_wc_listings.tex
          - tests/load_none.tex

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile smoke test
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ${{ matrix.testfile }}
          args: -pdf -interaction=nonstopmode -halt-on-error

  build-example:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile example document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: examples/latex_magic_example.tex
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload example PDF
        uses: actions/upload-artifact@v4
        with:
          name: latex-magic-example-pdf
          path: examples/latex_magic_example.pdf

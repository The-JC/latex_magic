name: LaTeX Package CI

on:
  push:
  pull_request:

jobs:
  test-loadability:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testfile:
          - tests/load_wirelesscomm.tex
          - tests/load_wc_macros.tex
          - tests/load_wc_listings.tex
          - tests/load_none.tex

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile smoke test
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ matrix.testfile }}
          args: -pdf -interaction=nonstopmode -halt-on-error
